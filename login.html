<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - MAC Chimbote</title>
    <link rel="stylesheet" href="login.css"> <!-- Enlace a tu archivo CSS -->
</head>
<body class="login-body">
    <div class="login-wrapper">
        <div class="login-card">
            
            <div class="login-header">
                <!-- Puedes usar el mismo logo de tu navbar -->
                <img src="icon/MAC-LOGO.png" alt="Logo MAC" class="login-logo">
                <h2>Acceso al Sistema</h2>
                <p>Módulos ERP y CRM</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="usuario@mac.gob.pe">
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn-submit">Ingresar</button>
            </form>

            <p id="error-message" class="error-msg">Credenciales incorrectas. Intente nuevamente.</p>

            <div class="login-footer">
                <a href="index.html" class="back-link">← Volver al inicio</a>
            </div>

        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            const USERS = [
                { email: 'admin@mac.gob.pe',   password: 'admin123',   role: 'admin',   redirect: 'erp-dashboard.html' },
                { email: 'usuario@mac.gob.pe', password: 'usuario123', role: 'usuario', redirect: 'crm-dashboard.html' }
            ];

            const match = USERS.find(u => u.email === email && u.password === password);

            if (match) {
                localStorage.setItem('mac_auth', JSON.stringify({ email: match.email, role: match.role }));
                globalThis.location.href = match.redirect;
            } else {
                document.getElementById('error-message').style.display = 'block';
            }
        });
    </script>
</body>
</html>
