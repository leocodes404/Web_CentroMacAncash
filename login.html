<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión / Registrarse - Centro MAC Chimbote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body class="login-body">
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-card__brand">
                <img src="icon/MAC-LOGO.png" alt="Logo MAC" class="login-logo">
                <div class="login-brand__text">
                    <h1>Centro MAC Chimbote</h1>
                    <p>Acceso al sistema</p>
                </div>
            </div>

            <div class="login-tabs" role="tablist">
                <button id="tabLogin" class="tab-button tab-button--active" type="button" data-tab="login" aria-selected="true">
                    Iniciar Sesión
                </button>
                <button id="tabRegister" class="tab-button" type="button" data-tab="register" aria-selected="false">
                    Registrarse
                </button>
            </div>

            <div class="tab-panels">
                <form id="loginForm" class="tab-panel tab-panel--active" novalidate>
                    <div class="input-group">
                        <label for="loginEmail">Correo electrónico</label>
                        <input type="email" id="loginEmail" autocomplete="email" required placeholder="usuario@mac.gob.pe">
                    </div>

                    <div class="input-group input-group--password">
                        <label for="loginPassword">Contraseña</label>
                        <div class="password-wrapper">
                            <input type="password" id="loginPassword" autocomplete="current-password" required placeholder="●●●●●●">
                            <button type="button" id="toggleLoginPassword" class="password-toggle" aria-label="Mostrar contraseña">Mostrar</button>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit btn-submit--login">Ingresar</button>
                </form>

                <form id="registerForm" class="tab-panel" novalidate>
                    <div class="input-group">
                        <label for="registerNombre">Nombre completo</label>
                        <input type="text" id="registerNombre" required placeholder="Juan Pérez Sánchez">
                    </div>

                    <div class="input-group">
                        <label for="registerDNI">DNI</label>
                        <input type="text" id="registerDNI" maxlength="8" pattern="\d{8}" required placeholder="12345678">
                    </div>

                    <div class="input-group">
                        <label for="registerEmail">Correo electrónico</label>
                        <input type="email" id="registerEmail" autocomplete="email" required placeholder="usuario@dominio.com">
                    </div>

                    <div class="input-group">
                        <label for="registerTelefono">Teléfono</label>
                        <input type="tel" id="registerTelefono" required placeholder="987654321">
                    </div>

                    <div class="input-group input-group--password">
                        <label for="registerPassword">Contraseña</label>
                        <input type="password" id="registerPassword" required placeholder="Mínimo 6 caracteres">
                    </div>

                    <div class="input-group input-group--password">
                        <label for="registerConfirmPassword">Confirmar contraseña</label>
                        <input type="password" id="registerConfirmPassword" required placeholder="Repite tu contraseña">
                    </div>

                    <button type="submit" class="btn-submit btn-submit--register">Crear cuenta</button>
                </form>
            </div>

            <p id="statusMessage" class="form-message" aria-live="polite"></p>

            <div class="login-footer">
                <a href="index.html" class="back-link">? Volver al inicio</a>
            </div>
        </div>
    </div>

    <script>
        // ---------- Funciones de storage y datos iniciales ----------
        function getUsuarios() {
            return JSON.parse(localStorage.getItem('mac_usuarios')) || [];
        }

        function setUsuarios(arr) {
            localStorage.setItem('mac_usuarios', JSON.stringify(arr));
        }

        function getReservas() {
            return JSON.parse(localStorage.getItem('mac_reservas')) || [];
        }

        function setReservas(arr) {
            localStorage.setItem('mac_reservas', JSON.stringify(arr));
        }

        function getMensajes() {
            return JSON.parse(localStorage.getItem('mac_mensajes')) || [];
        }

        function setMensajes(arr) {
            localStorage.setItem('mac_mensajes', JSON.stringify(arr));
        }

        function getSesion() {
            return JSON.parse(localStorage.getItem('mac_sesion'));
        }

        function setSesion(usuario) {
            localStorage.setItem('mac_sesion', JSON.stringify(usuario));
        }

        function cerrarSesion() {
            localStorage.removeItem('mac_sesion');
            window.location.href = 'login.html';
        }

        function inicializarDatos() {
            if (!localStorage.getItem('mac_usuarios')) {
                setUsuarios([
                    { uid: '001', nombre: 'Admin MAC', dni: '00000001', email: 'admin@mac.gob.pe', telefono: '981317379', role: 'admin', activo: true, creadoEn: '2025-01-01', password: 'admin2025' },
                    { uid: '002', nombre: 'María López Torres', dni: '12345678', email: 'maria@gmail.com', telefono: '987654321', role: 'user', activo: true, creadoEn: '2025-03-10', password: 'mac2025' },
                    { uid: '003', nombre: 'Carlos Ruiz Sánchez', dni: '87654321', email: 'carlos@gmail.com', telefono: '912345678', role: 'user', activo: true, creadoEn: '2025-04-05', password: 'mac2025' },
                    { uid: '004', nombre: 'Ana Flores Pérez', dni: '11223344', email: 'ana@gmail.com', telefono: '945678901', role: 'user', activo: false, creadoEn: '2025-05-20', password: 'mac2025' }
                ]);
            }

            if (!localStorage.getItem('mac_reservas')) {
                setReservas([
                    { id:'MAC-ANCASH-0001', uid:'002', nombre:'María López Torres', dni:'12345678', entidad:'RENIEC', fecha:'2025-06-20', hora:'09:00', motivo:'Renovación de DNI', estado:'pendiente', creadoEn:'2025-06-15' },
                    { id:'MAC-ANCASH-0002', uid:'003', nombre:'Carlos Ruiz Sánchez', dni:'87654321', entidad:'Migraciones', fecha:'2025-06-18', hora:'10:30', motivo:'Pasaporte por primera vez', estado:'atendido', creadoEn:'2025-06-10' },
                    { id:'MAC-ANCASH-0003', uid:'002', nombre:'María López Torres', dni:'12345678', entidad:'Banco de la Nación', fecha:'2025-06-22', hora:'11:00', motivo:'Apertura de cuenta', estado:'pendiente', creadoEn:'2025-06-14' },
                    { id:'MAC-ANCASH-0004', uid:'004', nombre:'Ana Flores Pérez', dni:'11223344', entidad:'EsSalud', fecha:'2025-06-10', hora:'08:30', motivo:'Afiliación', estado:'cancelado', creadoEn:'2025-06-01' },
                    { id:'MAC-ANCASH-0005', uid:'003', nombre:'Carlos Ruiz Sánchez', dni:'87654321', entidad:'RENIEC', fecha:'2025-06-25', hora:'14:00', motivo:'Partida de nacimiento', estado:'pendiente', creadoEn:'2025-06-16' }
                ]);
            }

            if (!localStorage.getItem('mac_mensajes')) {
                setMensajes([
                    { id:'MSG-001', uid:'002', nombre:'María López Torres', asunto:'Confirmación de turno RENIEC', mensaje:'Su turno MAC-ANCASH-0001 ha sido confirmado para el 20 de junio a las 09:00. Preséntese con su DNI original.', fecha:'2025-06-15', leido:false },
                    { id:'MSG-002', uid:'002', nombre:'María López Torres', asunto:'Recordatorio de cita', mensaje:'Le recordamos que mañana tiene una cita en Banco de la Nación a las 11:00. No olvide llevar los documentos requeridos.', fecha:'2025-06-21', leido:true },
                    { id:'MSG-003', uid:'003', nombre:'Carlos Ruiz Sánchez', asunto:'Turno atendido exitosamente', mensaje:'Su trámite en Migraciones ha sido completado exitosamente. Gracias por usar el Centro MAC Chimbote.', fecha:'2025-06-18', leido:false }
                ]);
            }
        }

        function validarEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function mostrarMensaje(texto, tipo = 'error') {
            const mensaje = document.getElementById('statusMessage');
            mensaje.textContent = texto;
            mensaje.className = 'form-message form-message--' + tipo;
        }

        function cambiarTab(tab) {
            const loginTab = document.getElementById('loginForm');
            const registerTab = document.getElementById('registerForm');
            const btnLogin = document.getElementById('tabLogin');
            const btnRegister = document.getElementById('tabRegister');

            const isLogin = tab === 'login';

            loginTab.classList.toggle('tab-panel--active', isLogin);
            registerTab.classList.toggle('tab-panel--active', !isLogin);
            btnLogin.classList.toggle('tab-button--active', isLogin);
            btnRegister.classList.toggle('tab-button--active', !isLogin);
            btnLogin.setAttribute('aria-selected', isLogin.toString());
            btnRegister.setAttribute('aria-selected', (!isLogin).toString());

            mostrarMensaje('', 'info');
        }

        function activarTabInicial() {
            const params = new URLSearchParams(window.location.search);
            const tab = params.get('tab') === 'register' ? 'register' : 'login';
            cambiarTab(tab);
        }

        function formatearFechaHoy() {
            const hoy = new Date();
            const yyyy = hoy.getFullYear();
            const mm = String(hoy.getMonth() + 1).padStart(2, '0');
            const dd = String(hoy.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        // ---------- Inicialización ----------
        function inicializarPagina() {
            inicializarDatos();
            activarTabInicial();

            // Toggle de pestañas
            document.querySelectorAll('.tab-button').forEach(button => {
                button.addEventListener('click', () => {
                    cambiarTab(button.dataset.tab);
                });
            });

            // Mostrar / ocultar contraseña en login
            document.getElementById('toggleLoginPassword').addEventListener('click', function (e) {
                e.preventDefault();
                const passwordInput = document.getElementById('loginPassword');
                const visible = passwordInput.type === 'text';
                passwordInput.type = visible ? 'password' : 'text';
                this.textContent = visible ? 'Mostrar' : 'Ocultar';
            });

            // Envío de login
            document.getElementById('loginForm').addEventListener('submit', function (event) {
                event.preventDefault();
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value.trim();

                if (!email || !password) {
                    mostrarMensaje('Por favor completa correo y contraseña.', 'error');
                    return;
                }

                const usuarios = getUsuarios();
                const usuario = usuarios.find(u => u.email.toLowerCase() === email.toLowerCase() && u.activo);

                if (!usuario || usuario.password !== password) {
                    mostrarMensaje('Correo o contraseña incorrectos.', 'error');
                    return;
                }

                setSesion(usuario);
                if (usuario.role === 'admin') {
                    window.location.href = 'erp.html';
                } else {
                    window.location.href = 'crm.html';
                }
            });

            // Envío de registro
            document.getElementById('registerForm').addEventListener('submit', function (event) {
                event.preventDefault();
                const nombre = document.getElementById('registerNombre').value.trim();
                const dni = document.getElementById('registerDNI').value.trim();
                const email = document.getElementById('registerEmail').value.trim();
                const telefono = document.getElementById('registerTelefono').value.trim();
                const password = document.getElementById('registerPassword').value.trim();
                const confirmPassword = document.getElementById('registerConfirmPassword').value.trim();

                if (!nombre || !dni || !email || !telefono || !password || !confirmPassword) {
                    mostrarMensaje('Todos los campos son obligatorios.', 'error');
                    return;
                }

                if (!/^\d{8}$/.test(dni)) {
                    mostrarMensaje('El DNI debe tener exactamente 8 dígitos numéricos.', 'error');
                    return;
                }

                if (!validarEmail(email)) {
                    mostrarMensaje('Ingresa un correo electrónico válido.', 'error');
                    return;
                }

                const usuarios = getUsuarios();
                if (usuarios.some(u => u.email.toLowerCase() === email.toLowerCase())) {
                    mostrarMensaje('El correo ya está registrado.', 'error');
                    return;
                }

                if (password.length < 6) {
                    mostrarMensaje('La contraseña debe tener al menos 6 caracteres.', 'error');
                    return;
                }

                if (password !== confirmPassword) {
                    mostrarMensaje('Las contraseñas no coinciden.', 'error');
                    return;
                }

                const nuevoUsuario = {
                    uid: Date.now().toString(),
                    nombre,
                    dni,
                    email,
                    telefono,
                    role: 'user',
                    activo: true,
                    creadoEn: formatearFechaHoy(),
                    password
                };

                usuarios.push(nuevoUsuario);
                setUsuarios(usuarios);
                setSesion(nuevoUsuario);

                mostrarMensaje('Cuenta creada correctamente. Redirigiendo...', 'success');
                setTimeout(() => {
                    window.location.href = 'crm.html';
                }, 800);
            });
        }

        // Ejecutar al cargar
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', inicializarPagina);
        } else {
            inicializarPagina();
        }
    </script>
</body>
</html>
